<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas Plus Ultra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #1abc9c; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; } label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-save { width: 100%; background-color: #1abc9c; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        
        .ot-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .ot-info { flex-grow: 1; } .actions { display: flex; align-items: center; gap: 10px; }
        .sel-estado { padding: 8px; border-radius: 5px; font-weight: bold; color: white; border: none; }
        .est-hecho { background-color: #27ae60; } .est-pendiente { background-color: #f1c40f; color: #333; } .est-anulado { background-color: #e74c3c; }
        .btn-factura { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-peligro { background-color: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-secundario { background-color: #95a5a6; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .btn-editar { background-color: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .avatar-mini { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; object-fit: cover; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; }
        .avatar-mini:hover { border-color: #1abc9c; transform: scale(1.05); }

        .overlay-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2999; }
        .side-menu { position: fixed; top: 0; right: -350px; width: 320px; height: 100%; background: #2c3e50; color: white; transition: right 0.3s ease; z-index: 3000; box-shadow: -4px 0 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .side-menu.open { right: 0; }
        .close-menu { position: absolute; top: 15px; left: 20px; font-size: 30px; cursor: pointer; color: #aaa; }
        
        .perfil-header { text-align: center; padding: 40px 20px 20px 20px; border-bottom: 1px solid #34495e; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px auto; cursor: pointer; border-radius: 50%; overflow: hidden; border: 4px solid #1abc9c; }
        .avatar-large { width: 100%; height: 100%; object-fit: cover; background: #fff; }
        .avatar-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; font-size: 12px; padding: 5px 0; text-align: center; opacity: 0; transition: 0.3s; }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        
        .menu-items { padding: 20px; flex-grow: 1; }
        .btn-side { width: 100%; background: #34495e; color: white; border: none; padding: 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; text-align: left; font-size: 15px; transition: 0.2s; }
        .btn-side:hover { background: #1abc9c; }
        .btn-side-red { background: #e74c3c; text-align: center; font-weight: bold; margin-top: auto; border-radius: 0; padding: 20px; width: 100%; border: none; cursor: pointer; color: white; font-size: 16px; }

        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 30px; border-radius: 10px; width: 90%; max-width: 900px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
        
        .tabla-logs { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .tabla-logs th { background: #2c3e50; color: white; padding: 10px; text-align: left; }
        .tabla-logs td { padding: 10px; border-bottom: 1px solid #ddd; }
        .badge-log { padding: 5px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8em; }
        .bg-pend { background-color: #f39c12; } .bg-ok { background-color: #27ae60; } .bg-ko { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <div><a href="/bbdd" class="btn-secundario">🗄️ Abrir Base de Datos</a></div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="text-align: right; line-height: 1.2;">
                    <strong id="topNombre" style="color: #2c3e50; font-size: 1.1em;"></strong><br>
                    <small id="topRol" style="color: #7f8c8d; text-transform: capitalize;"></small>
                </div>
                <img id="topAvatar" src="" class="avatar-mini" onclick="abrirMenuLateral()">
            </div>
        </div>

        <h1>🛠️ Registro de OT</h1>
        <form id="formOT">
            <div class="form-group"><label>Código de OT</label><input type="text" id="codigo_ot" required></div>
            <div class="grid-2">
                <div class="form-group"><label>Fecha y hora del trabajo</label><input type="datetime-local" id="fecha_encargo" required></div>
                <div class="form-group"><label>Fecha y hora finalización (Opcional)</label><input type="datetime-local" id="fecha_completada"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Horas</label><input type="number" step="0.1" id="horas" required></div>
                <div class="form-group"><label>Técnicos</label><input type="number" id="num_tecnicos" value="1" required></div>
            </div>
            <div class="form-group"><label>Marca</label><input type="text" id="marca" required></div>
            <div class="grid-2">
                <div class="form-group"><label>Urgencia</label><select id="tipo_urgencia"><option value="Verde">🟢 Verde</option><option value="Amarillo">🟡 Amarillo</option><option value="Rojo">🔴 Rojo</option></select></div>
                <div class="form-group"><label>Materiales (€)</label><input type="number" step="0.01" id="materiales_precio" required></div>
            </div>
            <button type="submit" class="btn-save" id="btnGuardarMain">Guardar Orden de Trabajo</button>
        </form>

        <div class="lista-ots" style="margin-top: 40px;">
            <h2>📋 Órdenes Registradas</h2>
            <div id="contenedorOTs"></div>
        </div>
    </div>

    <div id="overlayMenu" class="overlay-menu" onclick="cerrarMenuLateral()"></div>
    <div id="sideMenu" class="side-menu">
        <span class="close-menu" onclick="cerrarMenuLateral()">&times;</span>
        <div class="perfil-header">
            <input type="file" id="inputFoto" style="display:none" accept="image/*" onchange="subirFoto(event)">
            <div class="avatar-container" onclick="document.getElementById('inputFoto').click()">
                <img id="menuAvatar" src="" class="avatar-large">
                <div class="avatar-overlay">📸 Subir foto</div>
            </div>
            <h2 id="menuNombre" style="margin: 0; color: #1abc9c;"></h2>
            <p id="menuRol" style="margin: 5px 0 0 0; color: #bdc3c7; text-transform: uppercase; font-size: 0.8em;"></p>
        </div>
        <div class="menu-items">
            <button class="btn-side" onclick="abrirModal('modalPassword')">🔑 Cambiar Contraseña</button>
            <div id="btnCrearTecnicoArea"></div>
            <button class="btn-side" style="background-color: #f39c12; margin-top: 20px;" onclick="abrirLogs()">📝 Registro de Auditoría</button>
        </div>
        <button class="btn-side-red" onclick="cerrarSesion()">🚪 CERRAR SESIÓN</button>
    </div>

    <div id="modalLogs" class="modal">
        <div class="modal-content" style="max-width: 1000px;">
            <span class="close-modal" onclick="cerrarModal('modalLogs')">&times;</span>
            <h2 style="margin-top:0;">📝 Historial y Auditoría</h2>
            
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="filtroLogAccion" onchange="renderizarLogs()" style="width:auto;"><option value="TODAS">Todas las Acciones</option><option value="Añadir OT">Añadir OT</option><option value="Editar OT">Editar OT</option><option value="Eliminar OT">Eliminar OT</option></select>
                <select id="filtroLogEstado" onchange="renderizarLogs()" style="width:auto;"><option value="TODOS">Todos los Estados</option><option value="PENDIENTE">Pendientes</option><option value="APROBADO">Aprobados</option><option value="RECHAZADO">Rechazados</option></select>
            </div>

            <table class="tabla-logs">
                <thead><tr><th>Fecha</th><th>Usuario</th><th>Acción</th><th>Referencia/Motivo</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="cuerpoLogs"></tbody>
            </table>
        </div>
    </div>

    <div id="modalEditarLog" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" onclick="cerrarModal('modalEditarLog')">&times;</span>
            <h2 style="margin-top:0;">✏️ Editar Petición</h2>
            <form id="formEditarLog">
                <input type="hidden" id="editLogId">
                <div class="form-group"><label>Código de OT</label><input type="text" id="e_codigo_ot" required></div>
                <div class="grid-2">
                    <div class="form-group"><label>Fecha y hora del trabajo</label><input type="datetime-local" id="e_fecha_encargo" required></div>
                    <div class="form-group"><label>Finalización (Opcional)</label><input type="datetime-local" id="e_fecha_completada"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Horas</label><input type="number" step="0.1" id="e_horas" required></div>
                    <div class="form-group"><label>Técnicos</label><input type="number" id="e_num_tecnicos" required></div>
                </div>
                <div class="form-group"><label>Marca</label><input type="text" id="e_marca" required></div>
                <div class="grid-2">
                    <div class="form-group"><label>Urgencia</label><select id="e_tipo_urgencia"><option value="Verde">🟢 Verde</option><option value="Amarillo">🟡 Amarillo</option><option value="Rojo">🔴 Rojo</option></select></div>
                    <div class="form-group"><label>Materiales (€)</label><input type="number" step="0.01" id="e_materiales_precio" required></div>
                </div>
                <button type="button" class="btn-save" onclick="guardarEdicionLog()">Guardar Cambios en la Petición</button>
            </form>
        </div>
    </div>

    <div id="modalPassword" class="modal"><div class="modal-content"><span class="close-modal" onclick="cerrarModal('modalPassword')">&times;</span><h2 style="margin-top:0;">🔑 Cambiar Clave</h2><input type="password" id="oldPass" placeholder="Contraseña actual" class="form-group"><input type="password" id="newPass" placeholder="Nueva contraseña" class="form-group"><button class="btn-save" onclick="guardarPassword()">Guardar</button></div></div>
    <div id="modalTecnico" class="modal"><div class="modal-content"><span class="close-modal" onclick="cerrarModal('modalTecnico')">&times;</span><h2 style="margin-top:0;">👷 Crear Técnico</h2><input type="text" id="newTecUser" placeholder="Nombre de usuario" class="form-group"><input type="text" id="newTecPass" placeholder="Contraseña asignada" class="form-group"><button class="btn-save" onclick="crearTecnico()">Crear Usuario</button></div></div>

    <script>
        const sesionStr = localStorage.getItem('sesionPlusUltra');
        if (!sesionStr) window.location.href = '/login';
        const sesion = JSON.parse(sesionStr);
        const imgDefecto = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=";
        const API_URL = 'http://localhost:3000/api/ot';
        let otsGlobal = [], logsGlobal = [];
        const headersSeguridad = { 'Content-Type': 'application/json', 'x-rol': sesion.rol, 'x-user': sesion.username };

        // Configuración inicial de placeholders para el año actual
        const prefijoAnoActual = `OT${new Date().getFullYear().toString().slice(-2)}/`;

        function inicializarUI() {
            document.getElementById('topNombre').innerText = sesion.username;
            document.getElementById('topRol').innerText = sesion.rol;
            document.getElementById('menuNombre').innerText = sesion.username;
            document.getElementById('menuRol').innerText = sesion.rol;
            const foto = sesion.foto || imgDefecto;
            document.getElementById('topAvatar').src = foto;
            document.getElementById('menuAvatar').src = foto;
            
            // Placeholder dinámico (ej: OT26/0001)
            document.getElementById('codigo_ot').placeholder = `${prefijoAnoActual}00001`;

            if (sesion.rol === 'admin' || sesion.rol === 'director') {
                document.getElementById('btnCrearTecnicoArea').innerHTML = `<button class="btn-side" onclick="abrirModal('modalTecnico')">👷 Crear Perfil Técnico</button>`;
            }
            if (sesion.rol === 'director') {
                document.getElementById('btnGuardarMain').innerText = "Enviar a Revisión (Standby)";
            }
        }
        inicializarUI();

        // Validaciones en cliente (UX)
        function validarFormulario(codigo, fechaIn, fechaOut) {
            if (!codigo.startsWith(prefijoAnoActual)) {
                alert(`❌ Error: El código de OT debe empezar obligatoriamente por ${prefijoAnoActual}`);
                return false;
            }
            if (fechaOut && new Date(fechaOut) <= new Date(fechaIn)) {
                alert(`❌ Error: La fecha y hora de finalización debe ser posterior a la de inicio.`);
                return false;
            }
            return true;
        }

        // MENÚ LATERAL Y AVATARES (Mismos de siempre)
        function abrirMenuLateral() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('overlayMenu').style.display = 'block'; }
        function cerrarMenuLateral() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('overlayMenu').style.display = 'none'; }
        function cerrarSesion() { localStorage.removeItem('sesionPlusUltra'); window.location.href = '/login'; }
        function abrirModal(id) { document.getElementById(id).style.display = 'block'; cerrarMenuLateral(); }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        function subirFoto(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                fetch('http://localhost:3000/api/usuarios/foto', { method: 'PUT', headers: headersSeguridad, body: JSON.stringify({ username: sesion.username, foto: e.target.result }) })
                .then(res => res.json()).then(() => {
                    sesion.foto = e.target.result; localStorage.setItem('sesionPlusUltra', JSON.stringify(sesion));
                    document.getElementById('topAvatar').src = e.target.result; document.getElementById('menuAvatar').src = e.target.result;
                });
            }; reader.readAsDataURL(file);
        }

        // GESTIÓN DE OTs
        function cargarOTs() {
            fetch(API_URL).then(res => res.json()).then(ots => {
                otsGlobal = ots; document.getElementById('contenedorOTs').innerHTML = '';
                ots.forEach(ot => {
                    let btnBorrar = sesion.rol === 'tecnico' ? '' : `<button class="btn-peligro" onclick="eliminarOT(${ot.id})">🗑️</button>`;
                    let disableSelect = sesion.rol === 'tecnico' ? 'disabled' : '';

                    document.getElementById('contenedorOTs').innerHTML += `
                        <div class="ot-card">
                            <div class="ot-info"><strong>${ot.codigo_ot}</strong> - ${ot.marca}</div>
                            <div class="actions">
                                <select class="sel-estado" ${disableSelect} onchange="cambiarEstado(${ot.id}, this)">
                                    <option value="PENDIENTE" ${ot.estado === 'PENDIENTE' ? 'selected' : ''}>PENDIENTE</option>
                                    <option value="HECHO" ${ot.estado === 'HECHO' ? 'selected' : ''}>HECHO</option>
                                </select>
                                ${btnBorrar}
                            </div>
                        </div>`;
                });
            });
        }
        
        function cambiarEstado(id, sel) { fetch(`${API_URL}/${id}/estado`, { method: 'PUT', headers: headersSeguridad, body: JSON.stringify({ estado: sel.value }) }).then(res => res.json()).then(d => { alert("ℹ️ " + d.mensaje); cargarOTs(); }); }
        function eliminarOT(id) { if(confirm("¿Seguro que quieres solicitar eliminarla?")) fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: headersSeguridad }).then(res => res.json()).then(d => { alert("ℹ️ " + d.mensaje); cargarOTs(); }); }

        document.getElementById('formOT').addEventListener('submit', function(e) {
            e.preventDefault();
            const codigo = document.getElementById('codigo_ot').value;
            const fechaEn = document.getElementById('fecha_encargo').value;
            const fechaCo = document.getElementById('fecha_completada').value;

            if (!validarFormulario(codigo, fechaEn, fechaCo)) return;

            const datos = { codigo_ot: codigo, fecha_encargo: fechaEn, fecha_completada: fechaCo, horas: parseFloat(document.getElementById('horas').value), num_tecnicos: parseInt(document.getElementById('num_tecnicos').value), marca: document.getElementById('marca').value, tipo_urgencia: document.getElementById('tipo_urgencia').value, materiales_precio: parseFloat(document.getElementById('materiales_precio').value) };
            fetch(API_URL, { method: 'POST', headers: headersSeguridad, body: JSON.stringify(datos) })
            .then(res => res.json()).then(data => { 
                if(data.error) alert("❌ " + data.error);
                else { alert("ℹ️ " + data.mensaje); document.getElementById('formOT').reset(); cargarOTs(); }
            });
        });

        // --- AUDITORÍA Y STANDBY ---
        function abrirLogs() { fetch('http://localhost:3000/api/logs').then(res => res.json()).then(data => { logsGlobal = data; renderizarLogs(); abrirModal('modalLogs'); }); }

        function renderizarLogs() {
            const fAccion = document.getElementById('filtroLogAccion').value;
            const fEstado = document.getElementById('filtroLogEstado').value;
            const tbody = document.getElementById('cuerpoLogs');
            tbody.innerHTML = '';

            logsGlobal.filter(l => (fAccion === 'TODAS' || l.accion.includes(fAccion)) && (fEstado === 'TODOS' || l.estado === fEstado))
            .forEach(log => {
                let badgeClass = log.estado === 'PENDIENTE' ? 'bg-pend' : (log.estado === 'APROBADO' ? 'bg-ok' : 'bg-ko');
                let botones = '';
                
                if (log.estado === 'PENDIENTE') {
                    // Si es Añadir OT, todos pueden editarla antes de aprobarla
                    if (log.accion === 'Añadir OT' && (sesion.rol === 'admin' || sesion.rol === 'director')) {
                        botones += `<button class="btn-editar" onclick="abrirEditarLog(${log.id})" title="Editar Petición">✏️</button> `;
                    }
                    // Si es Giancarlo (admin), puede aprobar o rechazar
                    if (sesion.rol === 'admin') {
                        botones += `
                            <button style="background:#27ae60; border:none; color:white; padding:5px 8px; border-radius:3px; cursor:pointer;" onclick="resolverLog(${log.id}, 'APROBADO')" title="Aprobar">✅</button>
                            <button style="background:#e74c3c; border:none; color:white; padding:5px 8px; border-radius:3px; cursor:pointer;" onclick="resolverLog(${log.id}, 'RECHAZADO')" title="Rechazar">❌</button>`;
                    }
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:0.8em;">${log.fecha}</td>
                        <td><strong>${log.usuario}</strong></td>
                        <td>${log.accion}</td>
                        <td style="max-width:300px; word-wrap:break-word;">${log.referencia}</td>
                        <td><span class="badge-log ${badgeClass}">${log.estado}</span></td>
                        <td>${botones || '-'}</td>
                    </tr>`;
            });
        }

        function resolverLog(id, resolucion) {
            let motivo = "";
            if (resolucion === 'RECHAZADO') {
                motivo = prompt("Por favor, introduce el motivo del rechazo:");
                if (motivo === null || motivo.trim() === "") {
                    alert("Debes introducir un motivo para rechazar la petición.");
                    return;
                }
            } else {
                if(!confirm(`¿Deseas APROBAR esta petición?`)) return;
            }

            fetch(`http://localhost:3000/api/logs/${id}/resolver`, { method: 'PUT', headers: headersSeguridad, body: JSON.stringify({ resolucion, motivo }) })
            .then(res => res.json()).then(data => { alert(data.mensaje); abrirLogs(); cargarOTs(); });
        }

        // --- EDITAR PENDIENTES ---
        function abrirEditarLog(id) {
            const log = logsGlobal.find(l => l.id === id);
            const datos = JSON.parse(log.datos);
            document.getElementById('editLogId').value = id;
            document.getElementById('e_codigo_ot').value = datos.codigo_ot;
            document.getElementById('e_fecha_encargo').value = datos.fecha_encargo;
            document.getElementById('e_fecha_completada').value = datos.fecha_completada || '';
            document.getElementById('e_horas').value = datos.horas;
            document.getElementById('e_num_tecnicos').value = datos.num_tecnicos;
            document.getElementById('e_marca').value = datos.marca;
            document.getElementById('e_tipo_urgencia').value = datos.tipo_urgencia;
            document.getElementById('e_materiales_precio').value = datos.materiales_precio;
            
            abrirModal('modalEditarLog');
        }

        function guardarEdicionLog() {
            const id = document.getElementById('editLogId').value;
            const codigo = document.getElementById('e_codigo_ot').value;
            const fechaEn = document.getElementById('e_fecha_encargo').value;
            const fechaCo = document.getElementById('e_fecha_completada').value;

            if (!validarFormulario(codigo, fechaEn, fechaCo)) return;

            const nuevosDatos = { codigo_ot: codigo, fecha_encargo: fechaEn, fecha_completada: fechaCo, horas: parseFloat(document.getElementById('e_horas').value), num_tecnicos: parseInt(document.getElementById('e_num_tecnicos').value), marca: document.getElementById('e_marca').value, tipo_urgencia: document.getElementById('e_tipo_urgencia').value, materiales_precio: parseFloat(document.getElementById('e_materiales_precio').value) };
            
            fetch(`http://localhost:3000/api/logs/${id}`, { method: 'PUT', headers: headersSeguridad, body: JSON.stringify({ nuevosDatos }) })
            .then(res => res.json()).then(data => {
                if(data.error) alert("❌ " + data.error);
                else { alert("✅ " + data.mensaje); cerrarModal('modalEditarLog'); abrirLogs(); }
            });
        }

        cargarOTs();
    </script>
</body>
</html>
