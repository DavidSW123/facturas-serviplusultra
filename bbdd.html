<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos OTs - ServiPlusUltra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ecf0f1; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .cabecera { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        .filtros-container { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dce4ec; }
        .filtros { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filtros input, .filtros select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; min-width: 140px; font-family: inherit; }
        .filtros-grupo-fecha { display: flex; gap: 10px; align-items: center; flex-grow: 1; min-width: 300px; background: #fff; padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; }
        .filtros-grupo-fecha input { border: none; padding: 5px; min-width: 110px; }
        
        table { width: 100%; border-collapse: collapse; background: white; white-space: nowrap; }
        th { background-color: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f2f6; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; color: white; display: inline-block; text-align: center; transition: 0.2s; }
        .btn:hover { filter: brightness(0.9); }
        .btn-excel { background-color: #27ae60; }
        .btn-volver { background-color: #95a5a6; }
        .btn-peligro { background-color: #e74c3c; padding: 5px 10px; }
        .btn-editar { background-color: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-limpiar { background-color: #e67e22; padding: 10px 15px; } 
        .badge { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8em; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow-y: auto; }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #aaa; transition: 0.3s; z-index: 10; }
        .form-group { margin-bottom: 15px; } label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-save { width: 100%; background-color: #f39c12; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn-secundario { background-color: #95a5a6; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .tecnico-badge { background: #3498db; color: white; padding: 6px 12px; border-radius: 15px; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .tecnico-badge span { cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: right; margin-bottom: 10px; color: #555; font-size: 0.9em;">
            <span id="infoUsuarioBBDD"></span>
        </div>

        <div class="cabecera">
            <h1 style="margin: 0;">🗄️ Visor de Base de Datos</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-excel" onclick="exportarExcel()">📊 Exportar a Excel</button>
                <a href="/" class="btn btn-volver">🔙 Volver al Inicio</a>
            </div>
        </div>

        <div class="filtros-container">
            <div class="filtros">
                <input type="text" id="filtroOT" placeholder="🔍 Código OT..." onkeyup="filtrarTabla()">
                <input type="text" id="filtroMarca" placeholder="🔍 Marca/Desc..." onkeyup="filtrarTabla()">
                
                <select id="filtroEstado" onchange="filtrarTabla()">
                    <option value="TODOS">Todos los Estados</option>
                    <option value="PENDIENTE">Pendientes</option>
                    <option value="HECHO">Hechos</option>
                    <option value="ANULADO">Anulados</option>
                </select>

                <select id="filtroCliente" onchange="filtrarTabla()">
                    <option value="TODOS">Todos los Clientes</option>
                </select>

                <div class="filtros-grupo-fecha">
                    <span style="font-size: 0.9em; color: #7f8c8d; font-weight: bold;">📅 Rango:</span>
                    <input type="date" id="filtroFechaInicio" onchange="filtrarTabla()" title="Fecha Desde">
                    <span style="color: #ccc;">-</span>
                    <input type="date" id="filtroFechaFin" onchange="filtrarTabla()" title="Fecha Hasta">
                </div>

                <button class="btn btn-limpiar" onclick="borrarFiltros()" title="Restablecer todos los filtros">✖️ Limpiar Filtros</button>
            </div>
        </div>

        <table id="tablaBBDD">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código OT</th>
                    <th>Cliente</th>
                    <th>Marca</th>
                    <th>Fecha Encargo</th>
                    <th>Urgencia</th>
                    <th>Horas</th>
                    <th>Técnicos</th>
                    <th>Materiales (€)</th>
                    <th>Estado</th>
                    <th id="colAcciones">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr><td colspan="11" style="text-align:center;">Cargando datos desde la nube...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="modalEditarOT" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal('modalEditarOT')">&times;</span>
            <h2 style="margin-top:0; color:#f39c12;">✏️ Editar Orden de Trabajo</h2>
            <form id="formEditarOTDirecto">
                <div class="grid-2">
                    <div class="form-group"><label>Código de OT</label><input type="text" id="ed_codigo_ot" required></div>
                    <div class="form-group"><label>Cliente</label><select id="ed_ot_cliente_id"><option value="">-- Sin asignar --</option></select></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Fecha encargo</label><input type="datetime-local" id="ed_fecha_encargo" required></div>
                    <div class="form-group"><label>Finalización</label><input type="datetime-local" id="ed_fecha_completada"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Horas</label><input type="number" step="0.1" id="ed_horas" required></div>
                    <div class="form-group"><label>Técnicos</label>
                        <div style="display:flex; gap:10px;"><select id="ed_selTecnicosAdd" style="flex-grow:1;"><option value="">-- Seleccionar --</option></select><button type="button" class="btn-secundario" style="margin:0; padding:10px;" onclick="agregarEdTecnicoOT()">Añadir</button></div>
                        <div id="ed_listaTecnicosOT" style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;"></div>
                    </div>
                </div>
                <div class="form-group"><label>Marca</label><input type="text" id="ed_marca" required></div>
                <div class="grid-2">
                    <div class="form-group"><label>Urgencia</label><select id="ed_tipo_urgencia"><option value="Verde">🟢 Verde</option><option value="Amarillo">🟡 Amarillo</option><option value="Rojo">🔴 Rojo</option></select></div>
                    <div class="form-group"><label>Materiales (€)</label><input type="number" step="0.01" id="ed_materiales_precio" required></div>
                </div>
                <button type="button" class="btn-save" onclick="guardarEdicionOT()">💾 Sobrescribir Cambios</button>
            </form>
        </div>
    </div>

    <script>
        const sesionStr = localStorage.getItem('sesionPlusUltra');
        if (!sesionStr) window.location.href = '/login';
        const sesion = JSON.parse(sesionStr);
        const headersSeguridad = { 'Content-Type': 'application/json', 'x-rol': sesion.rol, 'x-user': sesion.username };
        const prefijoAnoActual = `OT${new Date().getFullYear().toString().slice(-2)}/`;

        document.getElementById('infoUsuarioBBDD').innerHTML = `👤 <strong>${sesion.username.toUpperCase()}</strong> (${sesion.rol})`;

        if(sesion.rol !== 'admin') document.getElementById('colAcciones').style.display = 'none';

        let datosBBDD = [];
        let clientesGlobal = [];
        let ed_tecnicosSeleccionados = [];
        let otActualId = null;

        async function cargarDatos() {
            try {
                cargarUsuariosParaOT();
                
                const resClientes = await fetch('/api/clientes', { headers: headersSeguridad });
                clientesGlobal = await resClientes.json();

                const selectCliente = document.getElementById('filtroCliente');
                const selEdit = document.getElementById('ed_ot_cliente_id');
                const clientesAprobados = clientesGlobal.filter(c => c.estado === 'APROBADO');
                clientesAprobados.forEach(c => {
                    selectCliente.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
                    selEdit.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
                });

                const resOT = await fetch('/api/ot', { headers: headersSeguridad });
                datosBBDD = await resOT.json();
                dibujarTabla(datosBBDD);
            } catch(e) { document.getElementById('cuerpoTabla').innerHTML = '<tr><td colspan="11" style="color:red; text-align:center;">Error cargando datos.</td></tr>'; }
        }

        function dibujarTabla(datos) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = '';
            
            if(datos.length === 0) { tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; color: #7f8c8d; padding: 30px;">No hay resultados con los filtros seleccionados.</td></tr>'; return; }
            
            datos.forEach(ot => {
                let colorEstado = ot.estado === 'HECHO' ? '#27ae60' : (ot.estado === 'ANULADO' ? '#e74c3c' : '#f1c40f');
                let colorTexto = ot.estado === 'PENDIENTE' ? '#333' : 'white';

                let celdaAcciones = sesion.rol === 'admin' 
                    ? `<td style="display:flex; gap:5px;">
                         <button class="btn-editar" title="Editar OT" onclick="abrirEditarOT(${ot.id})">✏️</button>
                         <button class="btn btn-peligro" title="Borrar de la BBDD" onclick="eliminarFila(${ot.id})">🗑️</button>
                       </td>` 
                    : '<td style="display:none;"></td>';

                let cliente = clientesGlobal.find(c => c.id === ot.cliente_id);
                let nombreCliente = cliente ? cliente.nombre : 'Consumidor Final';
                let tecnicos = ot.tecnicos_nombres ? ot.tecnicos_nombres : ot.num_tecnicos;
                let fechaLimpia = ot.fecha_encargo ? ot.fecha_encargo.replace('T', ' ') : '';

                tbody.innerHTML += `<tr><td>${ot.id}</td><td><strong>${ot.codigo_ot}</strong></td><td>${nombreCliente}</td><td>${ot.marca}</td><td>${fechaLimpia}</td><td>${ot.tipo_urgencia}</td><td>${ot.horas}</td><td>${tecnicos}</td><td>${ot.materiales_precio} €</td><td><span class="badge" style="background-color: ${colorEstado}; color: ${colorTexto};">${ot.estado}</span></td>${celdaAcciones}</tr>`;
            });
        }

        function eliminarFila(id) { if(confirm("⚠ CUIDADO: Estás a punto de borrar esta OT para siempre. ¿Continuar?")) { fetch(`/api/ot/${id}`, { method: 'DELETE', headers: headersSeguridad }).then(res => res.json()).then(data => { if(data.error) alert("❌ " + data.error); else cargarDatos(); }); } }

        // 🔴 FUNCIONES DEL MODAL DE EDICIÓN 🔴
        function abrirModal(id) { document.getElementById(id).style.display = 'block'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
        function cargarUsuariosParaOT() { fetch('/api/usuarios/nombres').then(res => res.json()).then(data => { const s3 = document.getElementById('ed_selTecnicosAdd'); s3.innerHTML = '<option value="">-- Seleccionar --</option>'; data.forEach(u => { s3.innerHTML += `<option value="${u.username}">${u.username} (${u.rol})</option>`; }); }); }
        function agregarEdTecnicoOT() { const s = document.getElementById('ed_selTecnicosAdd'); if(s.value && !ed_tecnicosSeleccionados.includes(s.value)) { ed_tecnicosSeleccionados.push(s.value); renderizarEdTecnicosOT(); } s.value = ""; }
        function quitarEdTecnicoOT(nombre) { ed_tecnicosSeleccionados = ed_tecnicosSeleccionados.filter(t => t !== nombre); renderizarEdTecnicosOT(); }
        function renderizarEdTecnicosOT() { const d = document.getElementById('ed_listaTecnicosOT'); d.innerHTML = ''; ed_tecnicosSeleccionados.forEach(t => d.innerHTML += `<div class="tecnico-badge">👤 ${t} <span onclick="quitarEdTecnicoOT('${t}')">&times;</span></div>`); }
        function validarFormulario(codigo, fechaIn, fechaOut) { if (!codigo.startsWith(prefijoAnoActual)) { alert(`❌ Debe empezar por ${prefijoAnoActual}`); return false; } if (fechaOut && new Date(fechaOut) <= new Date(fechaIn)) { alert(`❌ Finalización posterior a inicio.`); return false; } return true; }

        function abrirEditarOT(id) {
            const ot = datosBBDD.find(o => o.id === id);
            otActualId = id;
            document.getElementById('ed_codigo_ot').value = ot.codigo_ot;
            document.getElementById('ed_ot_cliente_id').value = ot.cliente_id || '';
            document.getElementById('ed_fecha_encargo').value = ot.fecha_encargo || '';
            document.getElementById('ed_fecha_completada').value = ot.fecha_completada || '';
            document.getElementById('ed_horas').value = ot.horas;
            document.getElementById('ed_marca').value = ot.marca;
            document.getElementById('ed_tipo_urgencia').value = ot.tipo_urgencia;
            document.getElementById('ed_materiales_precio').value = ot.materiales_precio;
            
            ed_tecnicosSeleccionados = ot.tecnicos_nombres ? ot.tecnicos_nombres.split(',').map(t => t.trim()) : [];
            renderizarEdTecnicosOT();
            abrirModal('modalEditarOT');
        }

        function guardarEdicionOT() {
            if (ed_tecnicosSeleccionados.length === 0) { alert("❌ Asigna al menos un técnico."); return; }
            const datos = {
                codigo_ot: document.getElementById('ed_codigo_ot').value,
                cliente_id: document.getElementById('ed_ot_cliente_id').value || null,
                fecha_encargo: document.getElementById('ed_fecha_encargo').value,
                fecha_completada: document.getElementById('ed_fecha_completada').value,
                horas: parseFloat(document.getElementById('ed_horas').value),
                num_tecnicos: ed_tecnicosSeleccionados.length,
                tecnicos_nombres: ed_tecnicosSeleccionados.join(', '),
                marca: document.getElementById('ed_marca').value,
                tipo_urgencia: document.getElementById('ed_tipo_urgencia').value,
                materiales_precio: parseFloat(document.getElementById('ed_materiales_precio').value)
            };
            
            if (!validarFormulario(datos.codigo_ot, datos.fecha_encargo, datos.fecha_completada)) return;

            fetch(`/api/ot/${otActualId}`, { method: 'PUT', headers: headersSeguridad, body: JSON.stringify(datos) })
            .then(r => r.json()).then(d => {
                if (d.error) alert("❌ " + d.error);
                else { alert(d.mensaje); cerrarModal('modalEditarOT'); borrarFiltros(); } // Limpia y recarga
            });
        }

        // --- FILTROS BBDD ---
        function filtrarTabla() {
            const textoOT = document.getElementById('filtroOT').value.toLowerCase();
            const textoMarca = document.getElementById('filtroMarca').value.toLowerCase();
            const comboEstado = document.getElementById('filtroEstado').value;
            const comboCliente = document.getElementById('filtroCliente').value;
            const fechaIni = document.getElementById('filtroFechaInicio').value;
            const fechaFin = document.getElementById('filtroFechaFin').value;

            const filtrados = datosBBDD.filter(ot => {
                const coincideOT = ot.codigo_ot.toLowerCase().includes(textoOT);
                const coincideMarca = ot.marca.toLowerCase().includes(textoMarca);
                const coincideEstado = comboEstado === 'TODOS' || ot.estado === comboEstado;
                const coincideCliente = comboCliente === 'TODOS' || String(ot.cliente_id) === comboCliente;

                let coincideFecha = true;
                if (ot.fecha_encargo) {
                    const fechaOT = ot.fecha_encargo.split('T')[0];
                    if (fechaIni && fechaOT < fechaIni) coincideFecha = false;
                    if (fechaFin && fechaOT > fechaFin) coincideFecha = false;
                } else if (fechaIni || fechaFin) { coincideFecha = false; }

                return coincideOT && coincideMarca && coincideEstado && coincideCliente && coincideFecha;
            });
            dibujarTabla(filtrados);
        }

        function borrarFiltros() {
            document.getElementById('filtroOT').value = ''; document.getElementById('filtroMarca').value = ''; document.getElementById('filtroEstado').value = 'TODOS'; document.getElementById('filtroCliente').value = 'TODOS'; document.getElementById('filtroFechaInicio').value = ''; document.getElementById('filtroFechaFin').value = '';
            cargarDatos(); // Recarga y pinta limpio
        }

        function exportarExcel() {
            let tabla = document.getElementById("tablaBBDD"); let tablaClon = tabla.cloneNode(true);
            if(sesion.rol === 'admin') { for(let i=0; i<tablaClon.rows.length; i++) { tablaClon.rows[i].deleteCell(-1); } }
            let wb = XLSX.utils.table_to_book(tablaClon, {sheet:"Base de Datos OTs"});
            const fechaHoy = new Date().toISOString().split('T')[0]; XLSX.writeFile(wb, `Historial_ServiPlusUltra_${fechaHoy}.xlsx`);
        }

        cargarDatos();
    </script>
</body>
</html>
