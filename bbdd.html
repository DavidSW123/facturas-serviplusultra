<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos OTs - ServiPlusUltra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ecf0f1; padding: 20px; color: #333; margin: 0; }
        /* Añadido overflow-x para que en el iPhone se pueda deslizar la tabla hacia los lados */
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .cabecera { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        
        /* Filtros */
        .filtros { display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filtros input, .filtros select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; min-width: 150px; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; background: white; white-space: nowrap; }
        th { background-color: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f2f6; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; color: white; display: inline-block; text-align: center; }
        .btn-excel { background-color: #27ae60; }
        .btn-volver { background-color: #95a5a6; }
        .btn-peligro { background-color: #e74c3c; padding: 5px 10px; }
        .badge { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: right; margin-bottom: 10px; color: #555; font-size: 0.9em;">
            <span id="infoUsuarioBBDD"></span>
        </div>

        <div class="cabecera">
            <h1 style="margin: 0;">🗄️ Visor de Base de Datos</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-excel" onclick="exportarExcel()">📊 Exportar a Excel</button>
                <a href="/" class="btn btn-volver">🔙 Volver al Inicio</a>
            </div>
        </div>

        <div class="filtros">
            <input type="text" id="filtroOT" placeholder="🔍 Buscar por Código OT..." onkeyup="filtrarTabla()">
            <input type="text" id="filtroMarca" placeholder="🔍 Buscar por Marca..." onkeyup="filtrarTabla()">
            <select id="filtroEstado" onchange="filtrarTabla()">
                <option value="TODOS">Todos los Estados</option>
                <option value="PENDIENTE">Pendientes</option>
                <option value="HECHO">Hechos</option>
                <option value="ANULADO">Anulados</option>
            </select>
        </div>

        <table id="tablaBBDD">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código OT</th>
                    <th>Cliente</th> <th>Marca</th>
                    <th>Fecha Encargo</th>
                    <th>Urgencia</th>
                    <th>Horas</th>
                    <th>Técnicos</th>
                    <th>Materiales (€)</th>
                    <th>Estado</th>
                    <th id="colAcciones">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr><td colspan="11" style="text-align:center;">Cargando datos desde la nube...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // --- 1. SEGURIDAD Y SESIÓN ---
        const sesionStr = localStorage.getItem('sesionPlusUltra');
        if (!sesionStr) {
            window.location.href = '/login'; // Expulsar si no hay sesión
        }
        const sesion = JSON.parse(sesionStr);

        document.getElementById('infoUsuarioBBDD').innerHTML = `👤 <strong>${sesion.username.toUpperCase()}</strong> (${sesion.rol})`;

        // Ocultar la cabecera de "Acciones" si no es admin
        if(sesion.rol !== 'admin') {
            document.getElementById('colAcciones').style.display = 'none';
        }

        // --- 2. LÓGICA DE LA BBDD ---
        let datosBBDD = [];
        let clientesGlobal = []; // Para guardar los nombres de los clientes

        async function cargarDatos() {
            try {
                // Descargamos clientes primero
                const resClientes = await fetch('/api/clientes');
                clientesGlobal = await resClientes.json();

                // Descargamos OTs
                const resOT = await fetch('/api/ot');
                datosBBDD = await resOT.json();
                
                dibujarTabla(datosBBDD);
            } catch(e) {
                console.error("Error al cargar BBDD:", e);
                document.getElementById('cuerpoTabla').innerHTML = '<tr><td colspan="11" style="color:red; text-align:center;">Error cargando datos.</td></tr>';
            }
        }

        function dibujarTabla(datos) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = '';
            
            if(datos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">No hay OTs que coincidan con la búsqueda.</td></tr>';
                return;
            }
            
            datos.forEach(ot => {
                let colorEstado = ot.estado === 'HECHO' ? '#27ae60' : (ot.estado === 'ANULADO' ? '#e74c3c' : '#f1c40f');
                let colorTexto = ot.estado === 'PENDIENTE' ? '#333' : 'white';

                // Solo pintamos el botón y la celda (<td>) si es administrador
                let celdaAcciones = sesion.rol === 'admin' 
                    ? `<td><button class="btn btn-peligro" title="Borrar de la BBDD" onclick="eliminarFila(${ot.id})">🗑️</button></td>` 
                    : '<td style="display:none;"></td>';

                // Buscar el nombre del cliente
                let cliente = clientesGlobal.find(c => c.id === ot.cliente_id);
                let nombreCliente = cliente ? cliente.nombre : 'Consumidor Final';

                // Mostrar los nombres de los técnicos o el número
                let tecnicos = ot.tecnicos_nombres ? ot.tecnicos_nombres : ot.num_tecnicos;

                // Formatear la fecha para quitar la "T"
                let fechaLimpia = ot.fecha_encargo ? ot.fecha_encargo.replace('T', ' ') : '';

                tbody.innerHTML += `
                    <tr>
                        <td>${ot.id}</td>
                        <td><strong>${ot.codigo_ot}</strong></td>
                        <td>${nombreCliente}</td>
                        <td>${ot.marca}</td>
                        <td>${fechaLimpia}</td>
                        <td>${ot.tipo_urgencia}</td>
                        <td>${ot.horas}</td>
                        <td>${tecnicos}</td>
                        <td>${ot.materiales_precio} €</td>
                        <td><span class="badge" style="background-color: ${colorEstado}; color: ${colorTexto};">${ot.estado}</span></td>
                        ${celdaAcciones}
                    </tr>
                `;
            });
        }

        function eliminarFila(id) {
            if(confirm("⚠ CUIDADO: Estás a punto de borrar esta OT para siempre. ¿Continuar?")) {
                fetch(`/api/ot/${id}`, { 
                    method: 'DELETE',
                    headers: { 
                        'x-rol': sesion.rol,
                        'x-user': sesion.username // Añadido para que el servidor sepa quién borra
                    } 
                }).then(res => res.json()).then(data => {
                    if(data.error) alert("❌ " + data.error);
                    else cargarDatos();
                });
            }
        }

        function filtrarTabla() {
            const textoOT = document.getElementById('filtroOT').value.toLowerCase();
            const textoMarca = document.getElementById('filtroMarca').value.toLowerCase();
            const comboEstado = document.getElementById('filtroEstado').value;

            const filtrados = datosBBDD.filter(ot => {
                const coincideOT = ot.codigo_ot.toLowerCase().includes(textoOT);
                const coincideMarca = ot.marca.toLowerCase().includes(textoMarca);
                const coincideEstado = comboEstado === 'TODOS' || ot.estado === comboEstado;
                return coincideOT && coincideMarca && coincideEstado;
            });

            dibujarTabla(filtrados);
        }

        function exportarExcel() {
            let tabla = document.getElementById("tablaBBDD");
            let tablaClon = tabla.cloneNode(true);
            
            // Borramos la última columna (Acciones) para que no salga en el Excel
            if(sesion.rol === 'admin') {
                for(let i=0; i<tablaClon.rows.length; i++) { tablaClon.rows[i].deleteCell(-1); }
            }

            let wb = XLSX.utils.table_to_book(tablaClon, {sheet:"Base de Datos OTs"});
            
            // Le ponemos la fecha de hoy al Excel
            const fechaHoy = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Historial_ServiPlusUltra_${fechaHoy}.xlsx`);
        }

        cargarDatos();
    </script>
</body>
</html>
