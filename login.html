<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Facturas Plus Ultra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; }
        h1 { color: #1abc9c; margin-bottom: 30px; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #1abc9c; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #16a085; }
        .error-msg { color: #e74c3c; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🔐 Acceso al Sistema</h1>
        <div id="errorBox" class="error-msg">Credenciales incorrectas</div>
        <form id="formLogin">
            <input type="text" id="user" placeholder="Usuario" required>
            <input type="password" id="pass" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('errorBox').style.display = 'block';
                    document.getElementById('errorBox').innerText = data.error;
                } else {
                    // Guardamos la "llave" del usuario en la memoria del navegador
                    localStorage.setItem('sesionPlusUltra', JSON.stringify({ username: data.username, rol: data.rol }));
                    window.location.href = '/'; // Redirigimos al inicio
                }
            })
            .catch(() => alert("Error de conexión con el servidor."));
        });
    </script>
</body>
</html>
